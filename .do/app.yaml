# Digital Ocean App Platform spec for RapidScuba.
# Edit the GitHub repo / branch fields, then `doctl apps create --spec .do/app.yaml`
# (or paste in the DO control panel: Apps → Create App → Edit Spec).
name: rapidscuba
region: sfo

services:
  - name: web
    github:
      repo: dsneed123/rapid-scuba
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8000
    health_check:
      http_path: /api/health/
    build_command: bash backend/build.sh
    run_command: |
      cd backend &&
      python manage.py migrate --noinput &&
      gunicorn rapidscuba.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -
    envs:
      - key: DJANGO_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DJANGO_DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        scope: RUN_AND_BUILD_TIME
        value: ".ondigitalocean.app,rapidscuba.com,www.rapidscuba.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: "https://rapidscuba.com,https://www.rapidscuba.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: "https://*.ondigitalocean.app,https://rapidscuba.com,https://www.rapidscuba.com"
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "${rapidscuba-db.DATABASE_URL}"
      - key: INQUIRY_NOTIFY_TO
        scope: RUN_TIME
        value: "info@rapidscuba.com"
      - key: INQUIRY_NOTIFY_FROM
        scope: RUN_TIME
        value: "no-reply@rapidscuba.com"
      - key: EMAIL_HOST
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_PORT
        scope: RUN_TIME
        value: "587"
      - key: EMAIL_HOST_USER
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_USE_TLS
        scope: RUN_TIME
        value: "True"

databases:
  - name: rapidscuba-db
    engine: PG
    version: "16"
    production: false
